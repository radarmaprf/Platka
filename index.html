<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sky in Fire — лицензионная версия (аккаунты + ключи)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotatedmarker/leaflet.rotatedMarker.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <style>
        /* Стили авторизации */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui;
        }
        .auth-card {
            background: rgba(20,30,35,0.95);
            backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 40px 32px;
            text-align: center;
            width: 400px;
            max-width: 90%;
            color: #fff;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }
        .auth-card h2 { margin-bottom: 20px; }
        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 60px;
            border: none;
            background: rgba(42,58,58,0.8);
            color: #fff;
            text-align: center;
        }
        .auth-card button {
            width: 100%;
            background: #ffaa33;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            color: #1a2a2a;
        }
        .auth-card button:hover { background: #ffcc66; }
        .error-msg { color: #ff6666; margin-top: 10px; font-size: 14px; }
        .success-msg { color: #66ff66; margin-top: 10px; font-size: 14px; }
        .toggle-link { margin-top: 15px; font-size: 14px; cursor: pointer; color: #88aaff; }
        .toggle-link:hover { text-decoration: underline; }

        /* Стили игры (основные) */
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { font-family:'Segoe UI',system-ui; background:#0a0f12; overflow:hidden; height:100vh; color:#eef; }
        .screen { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; z-index:2000; background:radial-gradient(circle at 20% 30%,#0a1f1a,#030a08); }
        .missile-bg { position:absolute; inset:0; background:radial-gradient(circle at 20% 20%,rgba(255,102,0,0.15),transparent 50%), radial-gradient(circle at 80% 60%,rgba(0,170,255,0.15),transparent 50%), repeating-linear-gradient(45deg,rgba(255,255,255,0.02) 0px,rgba(255,255,255,0.02) 2px,transparent 2px,transparent 8px); pointer-events:none; }
        .scan-line { position:absolute; top:0; left:0; width:100%; height:2px; background:linear-gradient(90deg,transparent,#00ffaa,transparent); animation:scan 8s linear infinite; opacity:0.3; pointer-events:none; }
        @keyframes scan { 0%{top:0;} 100%{top:100%;} }
        .card { background:rgba(20,30,35,0.7); backdrop-filter:blur(14px); border-radius:48px; padding:40px 32px; text-align:center; max-width:90%; width:480px; color:#fff; box-shadow:0 25px 45px rgba(0,0,0,0.5),0 0 0 1px rgba(255,215,0,0.2); border:1px solid rgba(255,215,0,0.3); position:relative; z-index:10; }
        .logo { font-size:3rem; font-weight:900; letter-spacing:4px; text-transform:uppercase; background:linear-gradient(135deg,#ffb347,#ff8c00); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:0 0 15px rgba(255,140,0,0.5); margin-bottom:0.5rem; }
        .difficulty-select { display:flex; gap:12px; justify-content:center; margin-bottom:20px; margin-top:10px; }
        .difficulty-btn { background:#3a5e5e; border:2px solid #fff; border-radius:40px; padding:6px 12px; cursor:pointer; font-weight:bold; transition:0.1s; }
        .difficulty-btn.selected { background:#ffaa33; border-color:gold; color:#1a2a2a; }
        .card button { display:block; width:100%; background:rgba(255,255,255,0.08); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.15); color:white; padding:14px; margin:12px 0; font-size:1.1rem; font-weight:bold; border-radius:60px; cursor:pointer; transition:0.2s; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
        .card button:hover { transform:translateY(-2px); background:rgba(255,255,255,0.15); border-color:rgba(255,215,0,0.5); }
        .card input { width:100%; padding:12px; border-radius:60px; border:none; margin:12px 0; text-align:center; background:rgba(42,58,58,0.8); color:#fff; }
        .lobby-info { margin:12px 0; background:rgba(0,0,0,0.5); border-radius:40px; padding:8px; }
        .country-select { display:flex; gap:15px; justify-content:center; margin:20px 0; }
        .country-btn { flex:1; background:#3a5e5e; border:2px solid #fff; border-radius:40px; padding:10px; cursor:pointer; font-weight:bold; transition:0.1s; }
        .country-btn.selected { background:#ffaa33; border-color:gold; color:#1a2a2a; }
        .ready-btn { background:#ffaa33!important; color:#1a2a2a!important; }
        #gameHUD { position:fixed; top:12px; left:12px; right:12px; background:rgba(5,10,15,0.9); backdrop-filter:blur(12px); border-radius:30px; padding:8px 16px; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; z-index:1500; border:1px solid #00ffaa; box-shadow:0 0 20px rgba(0,255,170,0.25), inset 0 0 15px rgba(0,255,170,0.05); font-weight:bold; }
        .hud-resource { background:#1e2e2e; padding:4px 12px; border-radius:40px; display:inline-flex; align-items:center; gap:6px; color:#00ffaa; font-size:18px; }
        .hud-rank { background:#1e2e2e; padding:4px 12px; border-radius:40px; font-size:14px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; }
        .health-bars { display:flex; gap:20px; background:rgba(0,0,0,0.5); padding:4px 12px; border-radius:40px; }
        .health-bar { display:flex; align-items:center; gap:8px; }
        .bar-bg { width:120px; height:10px; background:#333; border-radius:10px; overflow:hidden; }
        .bar-fill { height:100%; width:0%; transition:width 0.3s; }
        .ru-fill { background:#ff5555; }
        .ua-fill { background:#55aaff; }
        @media (max-width:700px) {
            .health-bar { font-size:11px; }
            .bar-bg { width:80px; }
            #gameHUD { font-size:11px; padding:6px 12px; flex-direction:column; align-items:stretch; gap:6px; }
            .health-bars { justify-content:space-between; }
        }
        #buildPanel { position:fixed; bottom:20px; left:20px; background:rgba(0,0,0,0.8); backdrop-filter:blur(12px); border-radius:30px; padding:12px; display:flex; flex-direction:column; gap:8px; z-index:1500; border:1px solid #ffaa3344; }
        .build-btn { background:linear-gradient(180deg,#24353d,#17242b); border:1px solid #00ffaa44; box-shadow:0 0 10px rgba(0,255,170,0.15); transition:0.2s; border:none; color:#fff; padding:8px 16px; border-radius:40px; cursor:pointer; font-weight:bold; text-align:left; }
        .build-btn:hover { transform:translateX(5px); border-color:#00ffaa; background:linear-gradient(180deg,#2a4a5a,#1a2a3a); }
        .modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(180deg,#091116,#020508); border-radius:40px; padding:24px; z-index:3000; color:#fff; width:450px; text-align:center; border:2px solid #00ffaa; box-shadow:0 0 40px rgba(0,255,170,0.3); }
        .weapon-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:15px 0; max-height:350px; overflow-y:auto; padding-right:5px; }
        .weapon-card { background:#101820; border:2px solid #333; border-radius:20px; padding:12px; cursor:pointer; transition:0.2s; text-align:center; }
        .weapon-card:hover { transform:scale(1.02); background:#1a2830; }
        .weapon-card.selected { border-color:#00ffaa; box-shadow:0 0 15px rgba(0,255,170,0.4); background:#1e3038; }
        .weapon-card img { width:100%; height:80px; object-fit:contain; margin-bottom:6px; }
        .weapon-name { font-weight:bold; font-size:14px; margin:4px 0; }
        .weapon-stats { font-size:11px; opacity:0.8; }
        .zone-marker { background:rgba(0,0,0,0.8); border-radius:16px; padding:6px 10px; text-align:center; font-weight:bold; color:#fff; font-size:12px; box-shadow:0 0 10px rgba(0,0,0,0.5); white-space:nowrap; }
        @keyframes radarSpin { from{transform:translateX(-50%) rotate(0deg);} to{transform:translateX(-50%) rotate(360deg);} }
        .leaflet-marker-icon { transform-origin:center center; }
        .hidden-projectile { display:none !important; }
        .loading-indicator { background:rgba(0,0,0,0.7); color:white; padding:8px 16px; border-radius:30px; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:3000; }
        .explosion{
            width:30px;
            height:30px;
            border-radius:50%;
            background:#ffcc00;
            box-shadow:0 0 20px #ffcc00,0 0 40px orange,0 0 80px red;
            animation:explode .5s forwards;
        }
        @keyframes explode{
            from{ transform:scale(.2); opacity:1; }
            to{ transform:scale(3); opacity:0; }
        }
    </style>
</head>
<body>
<div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
        <h2 id="authTitle">ВХОД</h2>
        <input type="text" id="authLogin" placeholder="Логин">
        <input type="password" id="authPassword" placeholder="Пароль">
        <div id="authKeyGroup" style="display:none;">
            <input type="text" id="authKey" placeholder="Лицензионный ключ">
        </div>
        <button id="authSubmitBtn">ВОЙТИ</button>
        <div id="authMessage" class="error-msg"></div>
        <div class="toggle-link" id="toggleAuthMode">Нет аккаунта? Зарегистрироваться</div>
    </div>
</div>

<!-- Контейнер игры (изначально скрыт) -->
<div id="gameContainerFull" style="display:none;">
    <div id="menuScreen" class="screen">
        <div class="missile-bg"></div>
        <div class="scan-line"></div>
        <div class="card">
            <div class="logo">☢️ SKY IN FIRE</div>
            <div class="difficulty-select">
                <div id="diffEasy" class="difficulty-btn">EASY</div>
                <div id="diffNormal" class="difficulty-btn selected">NORMAL</div>
                <div id="diffHard" class="difficulty-btn">HARD</div>
                <div id="diffExtreme" class="difficulty-btn">EXTREME</div>
            </div>
            <button id="singleBtn">⚔️ ОДИНОЧНАЯ ИГРА</button>
            <button id="tutorialBtn">📖 ОБУЧЕНИЕ</button>
            <button id="createGameBtn">🌐 СОЗДАТЬ КОМНАТУ</button>
            <button id="joinGameBtn">🔌 ПОДКЛЮЧИТЬСЯ</button>
            <input type="text" id="roomCodeInput" placeholder="КОД КОМНАТЫ" style="display:none;">
            <button id="confirmJoinBtn" style="display:none;">ПОДКЛЮЧИТЬСЯ</button>
            <div id="roomDisplay" style="margin-top:10px; font-size:12px; opacity:0.8;"></div>
            <button id="logoutBtn" style="margin-top:15px; background:#aa3333;">🚪 ВЫЙТИ ИЗ АККАУНТА</button>
        </div>
    </div>
    <div id="lobbyScreen" class="screen" style="display:none;">
        <div class="card" style="width:400px;">
            <h1>ЛОББИ</h1>
            <div class="lobby-info">Код комнаты: <span id="lobbyRoomCode"></span></div>
            <div class="lobby-info">Игрок 1: <span id="player1Name">—</span> <span id="player1Ready">⚪</span></div>
            <div class="lobby-info">Игрок 2: <span id="player2Name">—</span> <span id="player2Ready">⚪</span></div>
            <div class="country-select">
                <div id="chooseRussia" class="country-btn">РОССИЯ</div>
                <div id="chooseUkraine" class="country-btn">УКРАИНА</div>
            </div>
            <button id="readyBtn" class="ready-btn">ГОТОВ</button>
            <div id="lobbyMessage"></div>
        </div>
    </div>
    <div id="attackModal" class="modal" style="display:none;">
        <h3>🎯 ВЫБОР ЦЕЛИ</h3>
        <select id="targetSelect" size="6" style="width:100%; margin-bottom:10px;"></select>
        <div>💥 ВООРУЖЕНИЕ (прокрутите вниз)</div>
        <div id="weaponGrid" class="weapon-grid"></div>
        <div>⚡ КОЛИЧЕСТВО: <button id="countMinus">-</button> <span id="countValue">1</span> <button id="countPlus">+</button></div>
        <div id="costDisplay" style="margin:10px 0; font-weight:bold;">СТОИМОСТЬ: 0 ⚡</div>
        <button id="attackConfirmBtn">АТАКОВАТЬ</button>
        <button id="attackCancelBtn">ОТМЕНА</button>
    </div>
    <div id="gameContainer" style="display:none; width:100%; height:100%; position:relative;">
        <div id="map" style="width:100%; height:100%;"></div>
        <div id="gameHUD">
            <div class="hud-resource">⚡ <span id="energy">300</span></div>
            <div class="hud-rank" id="rankDisplay">⭐ <span id="rankTitle">Рядовой</span> <span id="rankXp">0 XP</span></div>
            <div class="health-bars">
                <div class="health-bar"><span>🇷🇺</span><div class="bar-bg"><div class="bar-fill ru-fill" id="ruFill"></div></div><span id="ruPercent">0%</span></div>
                <div class="health-bar"><span>🇺🇦</span><div class="bar-bg"><div class="bar-fill ua-fill" id="uaFill"></div></div><span id="uaPercent">0%</span></div>
            </div>
        </div>
        <div id="buildPanel">
            <button class="build-btn" id="buildRadarBtn">📡 РАДАР (180)</button>
            <button class="build-btn" id="buildPvoBtn">🛡️ ПВО (220)</button>
            <button class="build-btn" id="buildPowerPlantBtn">⚡ ЭЛЕКТРОСТАНЦИЯ (250)</button>
            <button class="build-btn" id="buildRefineryBtn">⛽ НПЗ (400)</button>
            <button class="build-btn" id="buildRocketFactoryBtn">🚀 ЗАВОД РАКЕТ (500)</button>
            <button class="build-btn" id="cancelBuild">❌ ОТМЕНА</button>
        </div>
    </div>
</div>

<script>
    // ========== ЛИЦЕНЗИОННАЯ СИСТЕМА (аккаунты + ключи) ==========
    // 50 одноразовых ключей
    const VALID_KEYS = [
        "theoqjzn6heuwn478-yeneis528y", "kf92jdn30qpeor83-xmz73kdl", "h8d73jf92kdn392u-jd83mz",
        "vgs392kf92jdn30qpe-xy81m4n", "pq83jf92kdn30qpeor-74hs8w2", "mz73kdl92jdn30qpe-93jsk2l",
        "d83mzf92kdn30qpeor-2n83ks0", "81m4nf92kdn30qpeor-6h2j9sl", "74hs8w2kf92jdn30qpe-8k3jsl",
        "93jsk2lkd92jdn30qpe-1j4hs8", "2n83ks0f92jdn30qpeor-3m9sl2", "6h2j9slkf92jdn30qpe-7j3ks9",
        "8k3jsljf92kdn30qpeor-0n2hs4", "1j4hs8f92kdn30qpeor-2m8kdl", "3m9sl2kd92jdn30qpe-5j7hs1",
        "7j3ks9f92kdn30qpeor-8n2ks5", "0n2hs4jf92kdn30qpeor-3k9slm", "2m8kdlkf92jdn30qpe-6j1hs7",
        "5j7hs1f92kdn30qpeor-9n3ks2", "8n2ks5jf92kdn30qpeor-1k4slp", "3k9slmkf92jdn30qpe-4j6hs9",
        "6j1hs7f92kdn30qpeor-7n0ks3", "9n3ks2jf92kdn30qpeor-2k5slr", "1k4slpkf92jdn30qpe-5j8hs4",
        "4j6hs9f92kdn30qpeor-8n1ks6", "7n0ks3jf92kdn30qpeor-0k2slt", "2k5slrkf92jdn30qpe-3j7hs5",
        "5j8hs4f92kdn30qpeor-6n4ks8", "8n1ks6jf92kdn30qpeor-9k0slv", "0k2sltkf92jdn30qpe-2j5hs9",
        "3j7hs5f92kdn30qpeor-5n8ks1", "6n4ks8jf92kdn30qpeor-7k3slw", "9k0slvkf92jdn30qpe-0j2hs6",
        "2j5hs9f92kdn30qpeor-3n6ks4", "5n8ks1jf92kdn30qpeor-6k9slx", "7k3slwkf92jdn30qpe-9j4hs7",
        "0j2hs6f92kdn30qpeor-1n7ks5", "3n6ks4jf92kdn30qpeor-4k0sly", "6k9slxkf92jdn30qpe-7j1hs8",
        "9j4hs7f92kdn30qpeor-0n8ks2", "1n7ks5jf92kdn30qpeor-2k4slz", "4k0slykf92jdn30qpe-5j2hs9",
        "7j1hs8f92kdn30qpeor-8n5ks3", "0n8ks2jf92kdn30qpeor-1k6sla", "2k4slzkf92jdn30qpe-3j0hs2",
        "5j2hs9f92kdn30qpeor-6n7ks5", "8n5ks3jf92kdn30qpeor-9k1slb", "1k6slakf92jdn30qpe-2j3hs4",
        "3j0hs2f92kdn30qpeor-4n9ks7", "6n7ks5jf92kdn30qpeor-7k2slc"
    ];

    let accounts = {};
    try { const saved = localStorage.getItem("skyfire_accounts"); if(saved) accounts = JSON.parse(saved); } catch(e) {}
    function saveAccounts() { localStorage.setItem("skyfire_accounts", JSON.stringify(accounts)); }

    let currentUser = null;

    const authOverlay = document.getElementById('authOverlay');
    const authLogin = document.getElementById('authLogin');
    const authPassword = document.getElementById('authPassword');
    const authKeyGroup = document.getElementById('authKeyGroup');
    const authKey = document.getElementById('authKey');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const authMessage = document.getElementById('authMessage');
    const authTitle = document.getElementById('authTitle');
    const toggleLink = document.getElementById('toggleAuthMode');
    let isLoginMode = true;

    function showKeyInput() { authKeyGroup.style.display = 'block'; authSubmitBtn.innerText = "АКТИВИРОВАТЬ КЛЮЧ"; }
    function toggleMode() {
        isLoginMode = !isLoginMode;
        authTitle.innerText = isLoginMode ? "ВХОД" : "РЕГИСТРАЦИЯ";
        authSubmitBtn.innerText = isLoginMode ? "ВОЙТИ" : "ЗАРЕГИСТРИРОВАТЬСЯ";
        authMessage.innerText = "";
        authKeyGroup.style.display = 'none';
        authLogin.style.display = 'block';
        authPassword.style.display = 'block';
        toggleLink.style.display = 'block';
        toggleLink.innerText = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
    }

    function register(login, password) {
        if(!login || !password) { authMessage.innerText = "Введите логин и пароль"; return false; }
        if(accounts[login]) { authMessage.innerText = "Аккаунт уже существует"; return false; }
        accounts[login] = { password: password, keyUsed: null, gameData: null };
        saveAccounts();
        authMessage.innerText = "Аккаунт создан! Теперь войдите.";
        toggleMode();
        return true;
    }

    function login(login, password) {
        if(!login || !password) { authMessage.innerText = "Введите логин и пароль"; return false; }
        const acc = accounts[login];
        if(!acc || acc.password !== password) { authMessage.innerText = "Неверный логин или пароль"; return false; }
        currentUser = login;
        if(acc.keyUsed) { loadGameForUser(); return true; }
        authTitle.innerText = "АКТИВАЦИЯ ЛИЦЕНЗИИ";
        authLogin.style.display = 'none';
        authPassword.style.display = 'none';
        toggleLink.style.display = 'none';
        authMessage.innerText = "Введите лицензионный ключ для активации игры";
        showKeyInput();
        return false;
    }

    function activateKey(key) {
        if(!key) { authMessage.innerText = "Введите ключ"; return false; }
        const acc = accounts[currentUser];
        if(!acc) { authMessage.innerText = "Ошибка аккаунта"; return false; }
        if(acc.keyUsed) { authMessage.innerText = "Игра уже активирована"; return false; }
        if(!VALID_KEYS.includes(key)) { authMessage.innerText = "Неверный ключ"; return false; }
        const index = VALID_KEYS.indexOf(key);
        if(index !== -1) VALID_KEYS.splice(index,1);
        acc.keyUsed = key;
        saveAccounts();
        authMessage.innerText = "Ключ активирован! Игра запускается...";
        setTimeout(() => loadGameForUser(), 1000);
        return true;
    }

    function loadGameForUser() {
        const acc = accounts[currentUser];
        if(acc && acc.gameData) {
            try { const data = JSON.parse(acc.gameData); if(data.playerXP) playerXP = data.playerXP; if(data.playerStats) playerStats = data.playerStats; if(data.difficulty) difficulty = data.difficulty; updateRankUI(); } catch(e) {}
        }
        authOverlay.style.display = 'none';
        document.getElementById('gameContainerFull').style.display = 'block';
        if(window.saveInterval) clearInterval(window.saveInterval);
        window.saveInterval = setInterval(() => {
            if(currentUser && accounts[currentUser]) {
                accounts[currentUser].gameData = JSON.stringify({ playerXP, playerStats, difficulty });
                saveAccounts();
            }
        }, 30000);
    }

    function logout() {
        if(window.saveInterval) clearInterval(window.saveInterval);
        if(currentUser && accounts[currentUser]) {
            accounts[currentUser].gameData = JSON.stringify({ playerXP, playerStats, difficulty });
            saveAccounts();
        }
        location.reload();
    }

    authSubmitBtn.onclick = () => {
        if(isLoginMode) login(authLogin.value.trim(), authPassword.value.trim());
        else register(authLogin.value.trim(), authPassword.value.trim());
        if(authKeyGroup.style.display === 'block') activateKey(authKey.value.trim());
    };
    toggleLink.onclick = toggleMode;

    function restoreSession() {

        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.type = type;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
        osc.start();
        osc.stop(now + duration);
    }

    function launchAttack(airport, targetObj, type, count){
        let weapon = weaponTypes[type];
        let costPerUnit = weapon.cost;
        if(resources < costPerUnit * count){ alert("Не хватает энергии"); return false; }
        let fromLatLng = airport.getLatLng();
        if (!fromLatLng || typeof fromLatLng.lat !== 'number') return false;
        for(let i=0;i<count;i++){
            resources -= costPerUnit;
            let offset = (i - (count-1)/2) * 0.03;
            let targetLat = targetObj.lat + offset;
            let targetLng = targetObj.lng + offset * 0.5;
            let p1 = map.latLngToLayerPoint([fromLatLng.lat, fromLatLng.lng]);
            let p2 = map.latLngToLayerPoint([targetLat, targetLng]);
            let dx = p2.x - p1.x;
            let dy = p2.y - p1.y;
            let angle = Math.atan2(dx, -dy) * 180 / Math.PI;
            angle += weapon.spriteOffset;
            let proj = { id: Date.now() + Math.random(), from: fromLatLng, to: {lat: targetLat, lng: targetLng}, progress: 0, speed: weapon.speed, damage: weapon.damage, team: myTeam, targetType: targetObj.type, targetId: targetObj.id, type: type, active: true, marker: null, lastInterceptCheck: 0, interceptedFlag: false, angle: angle };
            let marker = L.marker([proj.from.lat, proj.from.lng], { icon: getMissileIcon(type, myTeam), rotationOrigin: 'center center', rotationAngle: angle }).addTo(map);
            proj.marker = marker;
            projectiles.push(proj);
        }
        updateUI(); playBeep(800,0.2);
        if(!isAI && conn && conn.open) conn.send({ type:'launch', targetId:targetObj.id, targetType:targetObj.type, weapon:type, count, team:myTeam, lat:targetObj.lat, lng:targetObj.lng });
        return true;
    }

    function tryIntercept(proj){
        const now=Date.now(); if(now-proj.lastInterceptCheck<2000) return false; proj.lastInterceptCheck=now;
        const pos = proj.marker.getLatLng();
        for(let pvo of pvoSystems){
            if(pvo.team !== proj.team){
                let dist = map.distance([pvo.lat,pvo.lng], [pos.lat,pos.lng]);
                if(dist < 100000){
                    let chance = weaponTypes[proj.type].pvoChance;
                    if(Math.random() < chance){
                        playBeep(600,0.15);
                        launchInterceptor({lat:pvo.lat,lng:pvo.lng}, pos);
                        return true;
                    }
                }
            }
        }
        if(isAI && aiPvo && aiPvo.team !== proj.team){
            let dist = map.distance([aiPvo.lat,aiPvo.lng], [pos.lat,pos.lng]);
            if(dist < 100000){
                let chance = weaponTypes[proj.type].pvoChance;
                if(Math.random() < chance){
                    playBeep(600,0.15);
                    launchInterceptor({lat:aiPvo.lat,lng:aiPvo.lng}, pos);
                    return true;
                }
            }
        }
        return false;
    }

    function updateProjectiles(dt){
        for(let i=0;i<projectiles.length;i++){
            let p=projectiles[i]; if(!p.active) continue;
            if(tryIntercept(p)){ p.active=false; map.removeLayer(p.marker); projectiles.splice(i,1); i--; continue; }
            p.progress += p.speed * dt;
            if(p.progress >= 1){
                p.active=false; map.removeLayer(p.marker);
                if(p.targetType === 'zone'){
                    let targetZone = zones.find(z => z.id === p.targetId);
                    if(targetZone && targetZone.hp > 0){
                        targetZone.hp = Math.max(0, targetZone.hp - p.damage);
                        updateZoneMarkers(); playBeep(200,0.4); addXP(20);
                        if (targetZone.hp <= 0) { removeZoneIfDestroyed(targetZone); addXP(100); }
                    }
                } else if(p.targetType === 'building'){
                    let targetBuilding = buildings.find(b => b.id == p.targetId);
                    if(targetBuilding && targetBuilding.hp > 0){
                        targetBuilding.hp -= p.damage; playBeep(200,0.4); addXP(20);
                        if(targetBuilding.hp <= 0) destroyBuilding(targetBuilding);
                    }
                }
                updateStatsAfterHit(p.damage, p.targetType, true);
                projectiles.splice(i,1); i--; continue;
            }
            let lat = p.from.lat + (p.to.lat - p.from.lat) * p.progress;
            let lng = p.from.lng + (p.to.lng - p.from.lng) * p.progress;
            p.marker.setLatLng([lat, lng]);
            if (p.marker.setRotationAngle) p.marker.setRotationAngle(p.angle);
        }
    }

    function chooseAITargets(maxTargets=3){
        let candidates = [];
        buildings.forEach(b => { if(b.team !== myTeam) return; let base = priorityWeights[b.type]||30; let hpFactor = (b.hp<50)?20:0; candidates.push({ target:b, score:base+hpFactor }); });

        candidates.sort((a,b)=>b.score-a.score);
        let result = [];
        for(let i=0; i<Math.min(maxTargets, candidates.length); i++) result.push(candidates[i].target);
        if(difficulty === "EXTREME" && result.length>1 && Math.random()<0.4 && candidates.length>3) result.push(candidates[3].target);
        return result;
    }

    document.getElementById('diffExtreme').onclick=()=>{ document.querySelectorAll('.difficulty-btn').forEach(btn=>btn.classList.remove('selected')); document.getElementById('diffExtreme').classList.add('selected'); difficulty="EXTREME"; };
    document.getElementById('singleBtn').onclick=()=>{ playBeep(400,0.1); setTimeout(()=>{ playBeep(600,0.1); setTimeout(()=>{ playBeep(800,0.1); myTeam='russia'; enemyTeam='ukraine'; isAI=true; initGameMapAndLogic(); },100); },100); };
    document.getElementById('tutorialBtn').onclick=()=>{ alert("Обучение: постройте аэродром → радар → ПВО → атакуйте врага. Новые ракеты (X-101, Калибр, Кинжал, Искандер) доступны на HARD и EXTREME."); };
    document.getElementById('createGameBtn').onclick=()=>{ alert("Мультиплеер в разработке"); };
    document.getElementById('joinGameBtn').onclick=()=>{ document.getElementById('roomCodeInput').style.display='block'; document.getElementById('confirmJoinBtn').style.display='block'; };
    document.getElementById('confirmJoinBtn').onclick=()=>{ let code=document.getElementById('roomCodeInput').value.trim().toUpperCase(); if(code) alert("Мультиплеер в разработке"); else alert("Введите код"); };
    document.getElementById('chooseRussia').onclick=()=>{ if(lobbyState[isHost?'player1':'player2']?.ready) return; lobbyState[isHost?'player1':'player2'].team='russia'; lobbyState[isHost?'player1':'player2'].ready=false; updateLobbyUI(); sendLobbyUpdate(); };
    document.getElementById('chooseUkraine').onclick=()=>{ if(lobbyState[isHost?'player1':'player2']?.ready) return; lobbyState[isHost?'player1':'player2'].team='ukraine'; lobbyState[isHost?'player1':'player2'].ready=false; updateLobbyUI(); sendLobbyUpdate(); };
    document.getElementById('readyBtn').onclick=()=>{ if(!lobbyState[isHost?'player1':'player2']?.team){ alert("Выберите страну!"); return; } lobbyState[isHost?'player1':'player2'].ready=true; updateLobbyUI(); sendLobbyUpdate(); };
    document.getElementById('buildRadarBtn').onclick=()=>{ buildMode='radar'; };
    document.getElementById('buildPvoBtn').onclick=()=>{ buildMode='pvo'; };
    document.getElementById('buildPowerPlantBtn').onclick=()=>{ buildMode='powerPlant'; };
    document.getElementById('buildRefineryBtn').onclick=()=>{ buildMode='refinery'; };
    document.getElementById('buildRocketFactoryBtn').onclick=()=>{ buildMode='rocketFactory'; };
    document.getElementById('cancelBuild').onclick=()=>{ buildMode=null; };
    document.getElementById('countMinus').onclick=()=>{ if(attackCount>1) attackCount--; document.getElementById('countValue').innerText=attackCount; updateCostDisplay(); };
    document.getElementById('countPlus').onclick=()=>{ if(attackCount<5) attackCount++; document.getElementById('countValue').innerText=attackCount; updateCostDisplay(); };
    document.getElementById('attackConfirmBtn').onclick = () => {
        let select = document.getElementById('targetSelect'); let targetId = select.value; let targetType = select.options[select.selectedIndex].getAttribute('data-type'); let target;
        if (targetType === 'zone') { let z = zones.find(z => z.id === targetId); if (!z) { alert("Цель не найдена"); return; } target = { id: z.id, type: 'zone', lat: z.center[0], lng: z.center[1] }; }
        else { let b = buildings.find(b => b.id == targetId); if (!b) { alert("Цель не найдена"); return; } target = { id: b.id, type: 'building', lat: b.lat, lng: b.lng }; }
        if (currentAirport) launchAttack(currentAirport, target, attackType, attackCount);
        closeAttackModal();
    };
    document.getElementById('attackCancelBtn').onclick=()=>closeAttackModal();
    document.getElementById('logoutBtn').onclick = () => logout();
    function updateLobbyUI(){}
    function sendLobbyUpdate(){}
    function closeAttackModal(){ document.getElementById('attackModal').style.display='none'; }
</script>
</body>
</html>
