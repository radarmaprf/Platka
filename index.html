<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sky in Fire — аккаунты на всех устройствах</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotatedmarker/leaflet.rotatedMarker.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        /* ====== БАЗОВЫЕ СТИЛИ ====== */
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:#0a0f12; overflow:hidden; height:100vh; color:#eef; touch-action:manipulation; }
        .screen { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; z-index:2000; background:radial-gradient(circle at 20% 30%,#0a1f1a,#030a08); }
        .missile-bg { position:absolute; inset:0; background:radial-gradient(circle at 20% 20%,rgba(255,102,0,0.15),transparent 50%), radial-gradient(circle at 80% 60%,rgba(0,170,255,0.15),transparent 50%), repeating-linear-gradient(45deg,rgba(255,255,255,0.02) 0px,rgba(255,255,255,0.02) 2px,transparent 2px,transparent 8px); pointer-events:none; }
        .scan-line { position:absolute; top:0; left:0; width:100%; height:2px; background:linear-gradient(90deg,transparent,#00ffaa,transparent); animation:scan 8s linear infinite; opacity:0.3; pointer-events:none; }
        @keyframes scan { 0%{top:0;} 100%{top:100%;} }
        .card { background:rgba(20,30,35,0.85); backdrop-filter:blur(14px); border-radius:48px; padding:clamp(20px, 4vw, 40px) clamp(16px, 3vw, 32px); text-align:center; max-width:92%; width:480px; color:#fff; box-shadow:0 25px 45px rgba(0,0,0,0.5),0 0 0 1px rgba(255,215,0,0.2); border:1px solid rgba(255,215,0,0.3); position:relative; z-index:10; max-height:90vh; overflow-y:auto; }
        .logo { font-size:clamp(2.2rem, 6vw, 3.5rem); font-weight:900; letter-spacing:4px; text-transform:uppercase; background:linear-gradient(135deg,#ffb347,#ff8c00); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:0 0 15px rgba(255,140,0,0.5); margin-bottom:0.5rem; }
        .difficulty-select { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:10px 0 15px; }
        .difficulty-btn { background:#3a5e5e; border:2px solid #fff; border-radius:40px; padding:6px 12px; cursor:pointer; font-weight:bold; transition:0.1s; font-size:clamp(0.7rem, 1.5vw, 1rem); touch-action:manipulation; }
        .difficulty-btn.selected { background:#ffaa33; border-color:gold; color:#1a2a2a; }
        .card button { display:block; width:100%; background:rgba(255,255,255,0.08); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.15); color:white; padding:clamp(12px, 2.5vh, 16px); margin:10px 0; font-size:clamp(1rem, 2.5vw, 1.2rem); font-weight:bold; border-radius:60px; cursor:pointer; transition:0.2s; box-shadow:0 2px 5px rgba(0,0,0,0.2); touch-action:manipulation; }
        .card button:hover { transform:translateY(-2px); background:rgba(255,255,255,0.15); border-color:rgba(255,215,0,0.5); }
        .card button:active { transform:scale(0.96); }
        .card input { width:100%; padding:clamp(12px, 2.5vh, 16px); border-radius:60px; border:none; margin:10px 0; text-align:center; background:rgba(42,58,58,0.8); color:#fff; font-size:clamp(1rem, 2vw, 1.2rem); }
        .lobby-info { margin:8px 0; background:rgba(0,0,0,0.5); border-radius:40px; padding:8px; font-size:clamp(0.8rem, 1.5vw, 1rem); }
        .country-select { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin:15px 0; }
        .country-btn { flex:1; min-width:80px; background:#3a5e5e; border:2px solid #fff; border-radius:40px; padding:12px 8px; cursor:pointer; font-weight:bold; transition:0.1s; font-size:clamp(0.8rem, 1.5vw, 1.1rem); text-align:center; touch-action:manipulation; }
        .country-btn.selected { background:#ffaa33; border-color:gold; color:#1a2a2a; }
        .ready-btn { background:#ffaa33!important; color:#1a2a2a!important; }

        .auth-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:10000; display:flex; justify-content:center; align-items:center; }
        .auth-card { background:rgba(20,30,35,0.95); backdrop-filter:blur(14px); border-radius:48px; padding:clamp(20px, 4vw, 40px) clamp(16px, 3vw, 32px); text-align:center; width:400px; max-width:92%; color:#fff; border:1px solid rgba(255,215,0,0.3); box-shadow:0 25px 45px rgba(0,0,0,0.5); max-height:95vh; overflow-y:auto; }
        .auth-card h2 { font-size:clamp(1.6rem, 4vw, 2.2rem); margin-bottom:15px; }
        .auth-card input { width:100%; padding:clamp(12px, 2.5vh, 16px); margin:8px 0; border-radius:60px; border:none; background:rgba(42,58,58,0.8); color:#fff; text-align:center; font-size:clamp(1rem, 2vw, 1.2rem); }
        .auth-card button { width:100%; background:#ffaa33; border:none; padding:clamp(12px, 2.5vh, 16px); border-radius:60px; font-weight:bold; cursor:pointer; margin-top:10px; color:#1a2a2a; font-size:clamp(1rem, 2vw, 1.2rem); touch-action:manipulation; }
        .auth-card button:hover { background:#ffcc66; }
        .auth-card .error-msg { color:#ff6666; margin-top:8px; font-size:clamp(0.8rem, 1.5vw, 1rem); }
        .auth-card .toggle-link { margin-top:12px; font-size:clamp(0.8rem, 1.5vw, 1rem); cursor:pointer; color:#88aaff; }

        /* HUD */
        #gameHUD {
            position:fixed;
            top:8px;
            left:8px;
            right:8px;
            background:rgba(5,10,15,0.88);
            backdrop-filter:blur(12px);
            border-radius:clamp(16px, 3vw, 30px);
            padding:clamp(4px, 1vh, 10px) clamp(8px, 2vw, 16px);
            display:flex;
            flex-wrap:wrap;
            justify-content:space-between;
            align-items:center;
            z-index:1500;
            border:1px solid rgba(0,255,170,0.3);
            box-shadow:0 0 20px rgba(0,255,170,0.15);
            font-weight:bold;
            gap:4px;
            font-size:clamp(0.6rem, 1.6vw, 1rem);
            min-height:clamp(40px, 8vh, 60px);
        }
        .hud-resource { background:#1e2e2e; padding:2px 10px; border-radius:40px; display:inline-flex; align-items:center; gap:4px; color:#00ffaa; font-size:clamp(0.8rem, 2vw, 1.2rem); }
        .hud-rank { background:#1e2e2e; padding:2px 10px; border-radius:40px; display:inline-flex; align-items:center; gap:4px; font-size:clamp(0.6rem, 1.5vw, 1rem); }
        .health-bars { display:flex; gap:clamp(4px, 2vw, 20px); background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:40px; flex-wrap:wrap; }
        .health-bar { display:flex; align-items:center; gap:4px; font-size:clamp(0.5rem, 1.2vw, 0.9rem); }
        .bar-bg { width:clamp(40px, 15vw, 120px); height:clamp(4px, 1.5vh, 10px); background:#333; border-radius:10px; overflow:hidden; }
        .bar-fill { height:100%; width:0%; transition:width 0.3s; }
        .ru-fill { background:#ff5555; }
        .ua-fill { background:#55aaff; }

        /* Панель построек (адаптивная) */
        #buildPanel {
            position:fixed;
            bottom:clamp(10px, 3vh, 20px);
            left:clamp(10px, 3vw, 20px);
            z-index:1500;
            display:flex;
            flex-direction:column;
            gap:6px;
        }
        #buildToggle {
            display:none;
            background:linear-gradient(180deg,#ffaa33,#e68a00);
            border:none;
            color:#1a2a2a;
            padding:clamp(10px, 2vh, 16px) clamp(14px, 3vw, 20px);
            border-radius:60px;
            cursor:pointer;
            font-weight:bold;
            font-size:clamp(0.9rem, 2vw, 1.2rem);
            box-shadow:0 4px 15px rgba(255,170,51,0.4);
            transition:0.2s;
            touch-action:manipulation;
            min-height:clamp(44px, 8vh, 56px);
            min-width:clamp(44px, 10vw, 70px);
        }
        #buildToggle:active { transform:scale(0.95); }
        #buildMenu {
            display:flex;
            flex-direction:column;
            gap:4px;
            background:rgba(0,0,0,0.85);
            backdrop-filter:blur(12px);
            border-radius:clamp(16px, 3vw, 30px);
            padding:clamp(8px, 1.5vh, 14px);
            border:1px solid #ffaa3344;
            max-height:clamp(250px, 50vh, 400px);
            overflow-y:auto;
        }
        #buildMenu .build-btn {
            background:linear-gradient(180deg,#24353d,#17242b);
            border:1px solid #00ffaa44;
            box-shadow:0 0 10px rgba(0,255,170,0.08);
            border:none;
            color:#fff;
            padding:clamp(8px, 1.5vh, 12px) clamp(12px, 2vw, 18px);
            border-radius:40px;
            cursor:pointer;
            font-weight:bold;
            text-align:left;
            font-size:clamp(0.8rem, 1.8vw, 1.1rem);
            touch-action:manipulation;
            white-space:nowrap;
        }
        #buildMenu .build-btn:active { transform:scale(0.96); }
        #buildMenu .build-btn.cancel { background:#aa3333; border-color:#ff4444; }

        /* Модальное окно */
        .modal {
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:linear-gradient(180deg,#091116,#020508);
            border-radius:clamp(24px, 5vw, 40px);
            padding:clamp(16px, 3vh, 30px);
            z-index:3000;
            color:#fff;
            width:clamp(300px, 90vw, 500px);
            max-height:90vh;
            overflow-y:auto;
            text-align:center;
            border:2px solid #00ffaa;
            box-shadow:0 0 40px rgba(0,255,170,0.3);
        }
        .modal h3 { font-size:clamp(1.2rem, 3vw, 1.8rem); margin-bottom:12px; }
        .modal select { width:100%; padding:clamp(10px, 2vh, 14px); border-radius:40px; background:#1a2a2a; color:#fff; border:1px solid #00ffaa44; font-size:clamp(0.9rem, 2vw, 1.1rem); margin-bottom:10px; }
        .modal .weapon-grid {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:8px;
            margin:10px 0;
            max-height:clamp(200px, 40vh, 350px);
            overflow-y:auto;
        }
        .modal .weapon-card {
            background:#101820;
            border:2px solid #333;
            border-radius:16px;
            padding:8px;
            cursor:pointer;
            transition:0.2s;
            text-align:center;
            touch-action:manipulation;
        }
        .modal .weapon-card:active { transform:scale(0.95); }
        .modal .weapon-card.selected { border-color:#00ffaa; box-shadow:0 0 15px rgba(0,255,170,0.4); background:#1e3038; }
        .modal .weapon-card img { width:100%; height:clamp(40px, 8vh, 80px); object-fit:contain; margin-bottom:4px; }
        .modal .weapon-name { font-weight:bold; font-size:clamp(0.7rem, 1.5vw, 1rem); }
        .modal .weapon-stats { font-size:clamp(0.6rem, 1.2vw, 0.8rem); opacity:0.8; }
        .modal .flex { display:flex; gap:8px; justify-content:center; align-items:center; flex-wrap:wrap; margin:8px 0; }
        .modal .flex button { background:#3a5e5e; border:none; color:#fff; padding:6px 14px; border-radius:40px; cursor:pointer; font-size:clamp(1rem, 2vw, 1.2rem); touch-action:manipulation; }
        .modal .flex button:active { transform:scale(0.95); }
        .modal .flex span { font-size:clamp(1rem, 2vw, 1.2rem); min-width:30px; }
        .modal button { width:100%; padding:clamp(10px, 2vh, 14px); border-radius:40px; border:none; font-weight:bold; cursor:pointer; margin-top:6px; font-size:clamp(0.9rem, 2vw, 1.1rem); touch-action:manipulation; }
        .modal button:active { transform:scale(0.96); }
        #costDisplay { margin:8px 0; font-weight:bold; font-size:clamp(0.9rem, 2vw, 1.2rem); }

        .zone-marker { background:rgba(0,0,0,0.8); border-radius:16px; padding:4px 8px; text-align:center; font-weight:bold; color:#fff; font-size:clamp(0.5rem, 1vw, 0.8rem); box-shadow:0 0 10px rgba(0,0,0,0.5); white-space:nowrap; }
        .hidden-projectile { display:none !important; }
        .loading-indicator { background:rgba(0,0,0,0.7); color:white; padding:8px 16px; border-radius:30px; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:3000; font-size:clamp(0.9rem, 2vw, 1.2rem); }
        .explosion{ width:30px; height:30px; border-radius:50%; background:#ffcc00; box-shadow:0 0 20px #ffcc00,0 0 40px orange,0 0 80px red; animation:explode .5s forwards; }
        @keyframes explode{ from{ transform:scale(.2); opacity:1; } to{ transform:scale(3); opacity:0; } }
        @keyframes radarSpin { from{transform:translateX(-50%) rotate(0deg);} to{transform:translateX(-50%) rotate(360deg);} }
        .leaflet-marker-icon { transform-origin:center center; }
        .leaflet-control-zoom { display:none !important; }

        /* Адаптив */
        @media (max-width: 600px) {
            #gameHUD { flex-direction:column; align-items:stretch; gap:3px; padding:4px 8px; font-size:0.7rem; top:4px; left:4px; right:4px; border-radius:16px; min-height:auto; }
            .hud-resource, .hud-rank { font-size:0.9rem; padding:2px 8px; justify-content:center; }
            .health-bars { justify-content:space-around; padding:2px 4px; gap:4px; }
            .health-bar { font-size:0.6rem; gap:2px; }
            .bar-bg { width:50px; height:5px; }
            #buildPanel { bottom:10px; left:10px; gap:4px; }
            #buildToggle { display:block; font-size:1rem; padding:8px 14px; min-height:44px; min-width:44px; }
            #buildMenu { display:none; padding:8px; max-height:200px; border-radius:16px; }
            #buildMenu.open { display:flex; }
            #buildMenu .build-btn { font-size:0.8rem; padding:6px 12px; white-space:normal; }
            .modal { width:95vw; padding:16px; max-height:85vh; border-radius:24px; }
            .modal .weapon-grid { grid-template-columns:1fr 1fr; gap:6px; max-height:200px; }
            .modal .weapon-card { padding:6px; }
            .modal .weapon-card img { height:40px; }
            .modal .flex button { padding:4px 12px; font-size:0.9rem; }
            .card, .auth-card { padding:20px 16px; border-radius:32px; width:100%; max-width:95%; }
            .logo { font-size:2rem; }
            .difficulty-btn { font-size:0.6rem; padding:4px 8px; }
            .card button, .auth-card button { font-size:0.9rem; padding:10px; margin:6px 0; }
            .card input, .auth-card input { font-size:0.9rem; padding:10px; }
        }
        @media (min-width: 601px) and (max-width: 900px) {
            #gameHUD { padding:4px 12px; font-size:0.8rem; }
            .bar-bg { width:80px; height:7px; }
            .modal { width:80vw; padding:20px; }
            .card, .auth-card { padding:30px 24px; }
            .logo { font-size:2.5rem; }
        }
        @media (max-width: 800px) and (orientation: landscape) {
            #gameHUD { flex-direction:row; flex-wrap:wrap; font-size:0.6rem; padding:2px 8px; min-height:30px; }
            .hud-resource, .hud-rank { font-size:0.7rem; padding:2px 6px; }
            .bar-bg { width:40px; height:4px; }
            #buildToggle { padding:6px 12px; font-size:0.8rem; min-height:30px; }
            #buildMenu .build-btn { font-size:0.7rem; padding:4px 10px; }
            .modal { width:70vw; max-height:80vh; padding:12px; }
            .modal .weapon-grid { max-height:150px; }
            .modal .weapon-card img { height:30px; }
        }
        @media (max-width: 400px) {
            .card, .auth-card { padding:12px 10px; border-radius:24px; }
            .logo { font-size:1.6rem; }
            .difficulty-btn { font-size:0.5rem; padding:3px 6px; }
            .card button, .auth-card button { font-size:0.8rem; padding:8px; margin:4px 0; }
            .card input, .auth-card input { font-size:0.8rem; padding:8px; }
            .bar-bg { width:35px; height:4px; }
            .modal { padding:10px; width:98vw; }
            .modal h3 { font-size:1rem; }
            .modal .weapon-card { padding:4px; }
            .modal .weapon-card img { height:30px; }
        }
    </style>
</head>
<body>

<!-- Оверлей авторизации -->
<div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
        <h2 id="authTitle">ВХОД</h2>
        <input type="text" id="authLogin" placeholder="Логин">
        <input type="password" id="authPassword" placeholder="Пароль">
        <div id="authKeyGroup" style="display:none;">
            <input type="text" id="authKey" placeholder="Лицензионный ключ">
        </div>
        <button id="authSubmitBtn">ВОЙТИ</button>
        <div id="authMessage" class="error-msg"></div>
        <div class="toggle-link" id="toggleAuthMode">Нет аккаунта? Зарегистрироваться</div>
    </div>
</div>

<!-- Главное меню -->
<div id="menuScreen" class="screen">
    <div class="missile-bg"></div>
    <div class="scan-line"></div>
    <div class="card">
        <div class="logo">☢️ SKY IN FIRE</div>
        <div class="difficulty-select">
            <div id="diffEasy" class="difficulty-btn">EASY</div>
            <div id="diffNormal" class="difficulty-btn selected">NORMAL</div>
            <div id="diffHard" class="difficulty-btn">HARD</div>
            <div id="diffExtreme" class="difficulty-btn">EXTREME</div>
        </div>
        <button id="singleBtn">⚔️ ОДИНОЧНАЯ ИГРА</button>
        <button id="sandboxBtn">🏖️ ПЕСОЧНИЦА</button>
        <button id="tutorialBtn">📖 ОБУЧЕНИЕ</button>
        <button id="createGameBtn">🌐 СОЗДАТЬ КОМНАТУ</button>
        <button id="joinGameBtn">🔌 ПОДКЛЮЧИТЬСЯ</button>
        <input type="text" id="roomCodeInput" placeholder="КОД КОМНАТЫ" style="display:none;">
        <button id="confirmJoinBtn" style="display:none;">ПОДКЛЮЧИТЬСЯ</button>
        <div id="roomDisplay" style="margin-top:10px; font-size:clamp(0.6rem, 1.2vw, 0.9rem); opacity:0.8;"></div>
        <button id="logoutBtn" style="margin-top:15px; background:#aa3333;">🚪 ВЫЙТИ ИЗ АККАУНТА</button>
    </div>
</div>

<div id="lobbyScreen" class="screen" style="display:none;">
    <div class="card" style="width:400px; max-width:92%;">
        <h1>ЛОББИ</h1>
        <div class="lobby-info">Код комнаты: <span id="lobbyRoomCode"></span></div>
        <div class="lobby-info">Игрок 1: <span id="player1Name">—</span> <span id="player1Ready">⚪</span></div>
        <div class="lobby-info">Игрок 2: <span id="player2Name">—</span> <span id="player2Ready">⚪</span></div>
        <div class="country-select">
            <div id="chooseRussia" class="country-btn">РОССИЯ</div>
            <div id="chooseUkraine" class="country-btn">УКРАИНА</div>
        </div>
        <button id="readyBtn" class="ready-btn">ГОТОВ</button>
        <div id="lobbyMessage"></div>
    </div>
</div>

<!-- Модальное окно атаки -->
<div id="attackModal" class="modal" style="display:none;">
    <h3>🎯 ВЫБОР ЦЕЛИ</h3>
    <select id="targetSelect" size="5" style="width:100%; margin-bottom:10px;"></select>
    <div style="font-size:clamp(0.8rem, 1.5vw, 1rem);">💥 ВООРУЖЕНИЕ (прокрутите вниз)</div>
    <div id="weaponGrid" class="weapon-grid"></div>
    <div class="flex">
        <span>⚡ КОЛ-ВО:</span>
        <button id="countMinus">−</button>
        <span id="countValue">1</span>
        <button id="countPlus">+</button>
    </div>
    <div id="costDisplay">СТОИМОСТЬ: 0 ⚡</div>
    <button id="attackConfirmBtn" style="background:#ffaa33; color:#1a2a2a;">АТАКОВАТЬ</button>
    <button id="attackCancelBtn" style="background:#555; color:#fff;">ОТМЕНА</button>
</div>

<!-- Контейнер игры -->
<div id="gameContainer" style="display:none; width:100%; height:100%; position:relative;">
    <div id="map" style="width:100%; height:100%;"></div>
    <div id="gameHUD">
        <div class="hud-resource">⚡ <span id="energy">300</span></div>
        <div class="hud-rank">⭐ <span id="rankTitle">Рядовой</span> <span id="rankXp">0 XP</span></div>
        <div class="health-bars">
            <div class="health-bar"><span>🇷🇺</span><div class="bar-bg"><div class="bar-fill ru-fill" id="ruFill"></div></div><span id="ruPercent">0%</span></div>
            <div class="health-bar"><span>🇺🇦</span><div class="bar-bg"><div class="bar-fill ua-fill" id="uaFill"></div></div><span id="uaPercent">0%</span></div>
        </div>
    </div>

    <!-- Панель построек (адаптивная) -->
    <div id="buildPanel">
        <button id="buildToggle">🏗️ Стройка</button>
        <div id="buildMenu">

    function register(login, password) {

            if(snapshot.exists()) {

            } else {
                usersRef.child(login).set({
                    password: password,

        }).catch(err => {
            authMessage.innerText = "Ошибка проверки: " + err.message;
        });
        return false;

    // ВХОД
    async function login(login, password) {
        if(!login || !password) {
            authMessage.innerText = "Введите логин и пароль";
            return false;
        }
        try {
            const snapshot = await usersRef.child(login).get();
            if(!snapshot.exists()) {
                authMessage.innerText = "Аккаунт не найден";
                return false;
            }
            const userData = snapshot.val();
            if(userData.password !== password) {
                authMessage.innerText = "Неверный пароль";
                return false;
            }
            currentUser = login;
            const token = btoa(login + ":" + Date.now() + ":" + Math.random().toString(36));
            currentSessionToken = token;
            await sessionsRef.child(token).set({
                login: login,
                createdAt: Date.now()
            });
            localStorage.setItem("skyfire_session_token", token);
            authMessage.innerText = "Вход выполнен!";
            if(userData.keyUsed) {
                loadGameForUser(userData);
            } else {
                authTitle.innerText = "АКТИВАЦИЯ ЛИЦЕНЗИИ";
                authLogin.style.display = 'none';
                authPassword.style.display = 'none';
                toggleLink.style.display = 'none';
                authMessage.innerText = "Введите лицензионный ключ для активации игры";
                showKeyInput();
            }
            return true;
        } catch(err) {
            authMessage.innerText = "Ошибка: " + err.message;
            return false;
        }
    }

    // АКТИВАЦИЯ КЛЮЧА
    async function activateKey(key) {
        if(!key) {
            authMessage.innerText = "Введите ключ";
            return false;
        }
        if(!VALID_KEYS.includes(key)) {
            authMessage.innerText = "Неверный ключ (не соответствует формату)";
            return false;
        }
        const usedSnap = await db.ref('usedKeys/' + key).get();
        if(usedSnap.exists()) {
            authMessage.innerText = "Этот ключ уже был использован другим игроком!";
            return false;
        }
        await db.ref('usedKeys/' + key).set(true);
        const userRef = usersRef.child(currentUser);
        const userSnap = await userRef.get();
        if(!userSnap.exists()) {
            authMessage.innerText = "Ошибка: пользователь не найден";
            return false;
        }
        await userRef.update({ keyUsed: key });
        authMessage.innerText = "Ключ активирован! Запуск игры...";
        const updatedData = (await userRef.get()).val();
        loadGameForUser(updatedData);
        return true;
    }

                else if(difficulty === "EXTREME") document.getElementById('diffExtreme').classList.add('selected');
            } catch(e) {}
        }
        authOverlay.style.display = 'none';
        document.getElementById('menuScreen').style.display = 'flex';
        if(window.saveInterval) clearInterval(window.saveInterval);
        window.saveInterval = setInterval(() => {
            if(currentUser) {
                const data = JSON.stringify({ playerXP, playerStats, difficulty });
                usersRef.child(currentUser).update({ gameData: data });
            }
        }, 30000);
    }

    async function restoreSession() {
        const token = localStorage.getItem("skyfire_session_token");
        if(!token) {
            authOverlay.style.display = 'flex';
            return;
        }
        try {
            const snap = await sessionsRef.child(token).get();
            if(!snap.exists()) {
                localStorage.removeItem("skyfire_session_token");
                authOverlay.style.display = 'flex';
                return;
            }
            const sessionData = snap.val();
            const login = sessionData.login;
            const userSnap = await usersRef.child(login).get();
            if(!userSnap.exists()) {
                localStorage.removeItem("skyfire_session_token");
                authOverlay.style.display = 'flex';
                return;
            }
            currentUser = login;
            currentSessionToken = token;
            const userData = userSnap.val();
            const age = Date.now() - sessionData.createdAt;
            if(age > 30 * 24 * 3600 * 1000) {
                await sessionsRef.child(token).remove();
                localStorage.removeItem("skyfire_session_token");
                authOverlay.style.display = 'flex';
                return;
            }
            if(userData.keyUsed) {
                loadGameForUser(userData);
            } else {
                authOverlay.style.display = 'flex';
                authTitle.innerText = "АКТИВАЦИЯ ЛИЦЕНЗИИ";

                authMessage.innerText = "Введите лицензионный ключ для активации игры";
                showKeyInput();
            }
        } catch(err) {
            console.error("Ошибка восстановления сессии:", err);
            authOverlay.style.display = 'flex';
        }
    }

        currentUser = null;
        currentSessionToken = null;
        location.reload();
    }

        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.type = type;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
        osc.start();
        osc.stop(now + duration);
    }

    document.addEventListener('DOMContentLoaded', function() {
        const buildToggle = document.getElementById('buildToggle');
        const buildMenu = document.getElementById('buildMenu');
        let isOpen = false;
        if (buildToggle && buildMenu) {
            buildToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                isOpen = !isOpen;
                buildMenu.classList.toggle('open', isOpen);
                buildToggle.textContent = isOpen ? '🏗️ Закрыть' : '🏗️ Стройка';
            });
            document.querySelectorAll('#buildMenu .build-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (buildMenu.classList.contains('open')) {
                        buildMenu.classList.remove('open');
                        buildToggle.textContent = '🏗️ Стройка';
                        isOpen = false;
                    }
                });
            });
        }
    });
