    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }

        .screen { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; z-index:2000; background:radial-gradient(circle at 20% 30%,#0a1f1a,#030a08); }
        .missile-bg { position:absolute; inset:0; background:radial-gradient(circle at 20% 20%,rgba(255,102,0,0.15),transparent 50%), radial-gradient(circle at 80% 60%,rgba(0,170,255,0.15),transparent 50%), repeating-linear-gradient(45deg,rgba(255,255,255,0.02) 0px,rgba(255,255,255,0.02) 2px,transparent 2px,transparent 8px); pointer-events:none; }
        .scan-line { position:absolute; top:0; left:0; width:100%; height:2px; background:linear-gradient(90deg,transparent,#00ffaa,transparent); animation:scan 8s linear infinite; opacity:0.3; pointer-events:none; }

        .card { background:rgba(20,30,35,0.7); backdrop-filter:blur(14px); border-radius:48px; padding:40px 32px; text-align:center; max-width:90%; width:480px; color:#fff; box-shadow:0 25px 45px rgba(0,0,0,0.5),0 0 0 1px rgba(255,215,0,0.2); border:1px solid rgba(255,215,0,0.3); position:relative; z-index:10; }
        .logo { font-size:3rem; font-weight:900; letter-spacing:4px; text-transform:uppercase; background:linear-gradient(135deg,#ffb347,#ff8c00); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:0 0 15px rgba(255,140,0,0.5); margin-bottom:0.5rem; }
        .difficulty-select { display:flex; gap:12px; justify-content:center; margin-bottom:20px; margin-top:10px; }
        .difficulty-btn { background:#3a5e5e; border:2px solid #fff; border-radius:40px; padding:6px 12px; cursor:pointer; font-weight:bold; transition:0.1s; }
        .difficulty-btn.selected { background:#ffaa33; border-color:gold; color:#1a2a2a; }
        .card button { display:block; width:100%; background:rgba(255,255,255,0.08); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.15); color:white; padding:14px; margin:12px 0; font-size:1.1rem; font-weight:bold; border-radius:60px; cursor:pointer; transition:0.2s; box-shadow:0 2px 5px rgba(0,0,0,0.2); }

        .card input { width:100%; padding:12px; border-radius:60px; border:none; margin:12px 0; text-align:center; background:rgba(42,58,58,0.8); color:#fff; }
        .lobby-info { margin:12px 0; background:rgba(0,0,0,0.5); border-radius:40px; padding:8px; }
        .country-select { display:flex; gap:15px; justify-content:center; margin:20px 0; }
        .country-btn { flex:1; background:#3a5e5e; border:2px solid #fff; border-radius:40px; padding:10px; cursor:pointer; font-weight:bold; transition:0.1s; }
        .country-btn.selected { background:#ffaa33; border-color:gold; color:#1a2a2a; }
        .ready-btn { background:#ffaa33!important; color:#1a2a2a!important; }
        #gameHUD { position:fixed; top:12px; left:12px; right:12px; background:rgba(5,10,15,0.9); backdrop-filter:blur(12px); border-radius:30px; padding:8px 16px; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; z-index:1500; border:1px solid #00ffaa; box-shadow:0 0 20px rgba(0,255,170,0.25), inset 0 0 15px rgba(0,255,170,0.05); font-weight:bold; }
        .hud-resource { background:#1e2e2e; padding:4px 12px; border-radius:40px; display:inline-flex; align-items:center; gap:6px; color:#00ffaa; font-size:18px; }

        .hud-leaderboard { background:#1e2e2e; padding:4px 12px; border-radius:40px; font-size:14px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }

        @media (max-width:700px) {

        #buildPanel { position:fixed; bottom:20px; left:20px; background:rgba(0,0,0,0.8); backdrop-filter:blur(12px); border-radius:30px; padding:12px; display:flex; flex-direction:column; gap:8px; z-index:1500; border:1px solid #ffaa3344; }
        .build-btn { background:linear-gradient(180deg,#24353d,#17242b); border:1px solid #00ffaa44; box-shadow:0 0 10px rgba(0,255,170,0.15); transition:0.2s; border:none; color:#fff; padding:8px 16px; border-radius:40px; cursor:pointer; font-weight:bold; text-align:left; }
        .build-btn:hover { transform:translateX(5px); border-color:#00ffaa; background:linear-gradient(180deg,#2a4a5a,#1a2a3a); }
        .modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:linear-gradient(180deg,#091116,#020508); border-radius:40px; padding:24px; z-index:3000; color:#fff; width:350px; text-align:center; border:2px solid #00ffaa; box-shadow:0 0 40px rgba(0,255,170,0.3); }
        .stats-modal { width:420px; max-height:80vh; overflow-y:auto; }
        .zone-marker { background:rgba(0,0,0,0.8); border-radius:16px; padding:6px 10px; text-align:center; font-weight:bold; color:#fff; font-size:12px; box-shadow:0 0 10px rgba(0,0,0,0.5); white-space:nowrap; }
        @keyframes radarSpin { from{transform:translateX(-50%) rotate(0deg);} to{transform:translateX(-50%) rotate(360deg);} }
        .leaflet-marker-icon { transform-origin:center center; }
        .hidden-projectile { display:none !important; }
        .loading-indicator { background:rgba(0,0,0,0.7); color:white; padding:8px 16px; border-radius:30px; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:3000; }
        .explosion{
            width:60px;
            height:60px;
            border-radius:50%;
            background:radial-gradient(circle, #ffcc00, #ff6600);
            box-shadow:0 0 30px #ffcc00,0 0 60px orange,0 0 100px red;
            animation:explode 0.6s forwards;
        }
        @keyframes explode{
            from{ transform:scale(0.2); opacity:1; }
            to{ transform:scale(4); opacity:0; }
        }
        #menuLeaderboard ul { padding-left:20px; margin:0; }
        #menuLeaderboard li { list-style:none; padding:4px 0; border-bottom:1px solid #333; }
        #leaderboardList ul { list-style:none; padding:0; }

<body>
<div id="menuScreen" class="screen">
    <div class="missile-bg"></div>

    <div class="card">
        <div class="logo">☢️ SKY IN FIRE</div>
        <div class="difficulty-select">
            <div id="diffEasy" class="difficulty-btn">EASY</div>
            <div id="diffNormal" class="difficulty-btn selected">NORMAL</div>

        </div>

        <div class="lobby-info">Код комнаты: <span id="lobbyRoomCode"></span></div>

        <div class="hud-resource">⚡ <span id="energy">300</span></div>

        <div class="health-bars"><div class="health-bar"><span>🇷🇺</span><div class="bar-bg"><div class="bar-fill ru-fill" id="ruFill"></div></div><span id="ruPercent">0%</span></div>
        <div class="health-bar"><span>🇺🇦</span><div class="bar-bg"><div class="bar-fill ua-fill" id="uaFill"></div></div><span id="uaPercent">0%</span></div></div>

        <button class="build-btn" id="buildPowerPlantBtn">⚡ ЭЛЕКТРОСТАНЦИЯ (250)</button>
        <button class="build-btn" id="buildRefineryBtn">⛽ НПЗ (400)</button>
        <button class="build-btn" id="buildRocketFactoryBtn">🚀 ЗАВОД РАКЕТ (500)</button>
        <button class="build-btn" id="cancelBuild">❌ ОТМЕНА</button>

</div>

<script>
// ========== ОСНОВНЫЕ ПЕРЕМЕННЫЕ ==========
let map, gameActive=false, resources=300, buildings=[], zones=[], projectiles=[];
let radars=[], pvoSystems=[], powerPlants=[], refineries=[], rocketFactories=[];
let buildMode=null, airportMarker=null, enemyAirportMarker=null, airportPlaced=false, lastUpdate=0;
let myTeam=null, enemyTeam=null, isAI=false, difficulty="NORMAL";
let russiaGeoJSON=null, ukraineGeoJSON=null, bordersLoaded=false;
let radarAnimationInterval=null, aiInterval=null, economyInterval=null;
let peer=null, conn=null, isHost=false, lobbyState={ player1:{ready:false,team:null}, player2:{ready:false,team:null} }, roomId=null;
let attackType='drone', attackCount=1, currentAirport=null;
const costs={ radar:180, pvo:220, powerPlant:250, refinery:400, rocketFactory:500 };
const maxRadars=8, maxPvo=12, maxPowerPlants=5, maxRefineries=3;
let audioCtx=null;
function playBeep(f,d,t='sine'){ if(!audioCtx) audioCtx=new AudioContext(); let o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value=f; o.type=t; g.gain.setValueAtTime(0.15,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(1e-5,audioCtx.currentTime+d); o.start(); o.stop(audioCtx.currentTime+d); }

// ========== PNG ИКОНКИ ==========
function getAirportIcon(){ return L.icon({ iconUrl:'images/airport.png', iconSize:[48,48], iconAnchor:[24,24] }); }
function getRadarIcon(){ return L.icon({ iconUrl:'images/radar.png', iconSize:[40,40], iconAnchor:[20,20] }); }
function getPvoIcon(){ return L.icon({ iconUrl:'images/pvo.png', iconSize:[40,40], iconAnchor:[20,20] }); }
function getPowerPlantIcon(){ return L.icon({ iconUrl:'images/powerplant.png', iconSize:[40,40], iconAnchor:[20,20] }); }
function getRefineryIcon(){ return L.icon({ iconUrl:'images/refinery.png', iconSize:[40,40], iconAnchor:[20,20] }); }
function getRocketFactoryIcon(){ return L.icon({ iconUrl:'images/rocket_factory.png', iconSize:[40,40], iconAnchor:[20,20] }); }
function getInterceptorIcon(){ return L.icon({ iconUrl:'images/pvo_rocket.png', iconSize:[24,24], iconAnchor:[12,12] }); }
function getMissileIcon(type,team){
    if(type==='drone'){ let img=(team==='russia')?'images/drone_ru.png':'images/drone_ua.png'; return L.icon({ iconUrl:img, iconSize:[28,28], iconAnchor:[14,14] }); }
    let m={ cruise:'images/cruise.png', ballistic:'images/ballistic.png', hypersonic:'images/hypersonic.png' };
    let url=m[type]||'images/missile.png';
    return L.icon({ iconUrl:url, iconSize:[28,28], iconAnchor:[14,14] });
}

// ========== ГЕОГРАФИЯ ==========
const zoneData=[
    { name:'КИЕВ', center:[50.4501,30.5234], team:'ukraine', hp:400, baseHp:400 },
    { name:'ОДЕССА', center:[46.4825,30.7233], team:'ukraine', hp:320, baseHp:320 },
    { name:'ХАРЬКОВ', center:[49.9935,36.2304], team:'ukraine', hp:360, baseHp:360 },
    { name:'ДНЕПР', center:[48.4647,35.0467], team:'ukraine', hp:340, baseHp:340 },
    { name:'ЛЬВОВ', center:[49.8397,24.0297], team:'ukraine', hp:280, baseHp:280 },
    { name:'МОСКВА', center:[55.7558,37.6173], team:'russia', hp:480, baseHp:480 },
    { name:'БЕЛГОРОД', center:[50.5975,36.5858], team:'russia', hp:240, baseHp:240 },
    { name:'РОСТОВ', center:[47.2357,39.7015], team:'russia', hp:300, baseHp:300 },
    { name:'ВОРОНЕЖ', center:[51.6605,39.2003], team:'russia', hp:320, baseHp:320 },
    { name:'ВОЛГОГРАД', center:[48.7047,44.5133], team:'russia', hp:340, baseHp:340 },
    { name:'КРАСНОДАР', center:[45.0355,38.9753], team:'russia', hp:280, baseHp:280 }
];
const teamColors={ russia:'#ff5555', ukraine:'#55aaff' };

function loadRealBorders(cb){
    Promise.all([
        fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/RUS.geo.json').then(r=>r.json()),
        fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/UKR.geo.json').then(r=>r.json())
    ]).then(([rus,ukr])=>{ russiaGeoJSON=rus; ukraineGeoJSON=ukr; bordersLoaded=true; L.geoJSON(rus,{style:{color:'#ff6666',weight:2,fillOpacity:0.08}}).addTo(map); L.geoJSON(ukr,{style:{color:'#66aaff',weight:2,fillOpacity:0.08}}).addTo(map); if(cb)cb(); }).catch(e=>{ bordersLoaded=false; if(cb)cb(); });
}
function isInsideCountry(lat,lng,country){ if(!bordersLoaded||!russiaGeoJSON||!ukraineGeoJSON) return false; let p=turf.point([lng,lat]); let g=country==='russia'?russiaGeoJSON:ukraineGeoJSON; let feat=g.features?g.features[0]:g; return turf.booleanPointInPolygon(p,feat); }
function isOwnTerritory(lat,lng){ if(!myTeam) return false; return isInsideCountry(lat,lng,myTeam); }
function canBuildHere(lat,lng){ if(!isOwnTerritory(lat,lng)) return false; for(let b of buildings) if(map.distance([lat,lng],[b.lat,b.lng])<4000) return false; return true; }
function canBuildForTeam(lat,lng,team){ if(!isInsideCountry(lat,lng,team)) return false; for(let b of buildings) if(map.distance([lat,lng],[b.lat,b.lng])<4000) return false; return true; }

function updateTotalPercent(){
    let ruTotal=0,ruBase=0,uaTotal=0,uaBase=0;
    zones.forEach(z=>{ if(z.team==='russia'){ ruTotal+=z.hp; ruBase+=z.baseHp; } else { uaTotal+=z.hp; uaBase+=z.baseHp; } });
    let ruPercent=ruBase?ruTotal/ruBase*100:0, uaPercent=uaBase?uaTotal/uaBase*100:0;
    document.getElementById('ruPercent').innerText=Math.floor(ruPercent)+'%';
    document.getElementById('uaPercent').innerText=Math.floor(uaPercent)+'%';
    document.getElementById('ruFill').style.width=ruPercent+'%';
    document.getElementById('uaFill').style.width=uaPercent+'%';
    if(ruTotal<=0 && gameActive){
        gameActive=false;
        if(myTeam==='ukraine'){ alert("🏆 ПОБЕДА!"); updateStatsAfterGame(true); addXP(300); updateElo(true); }
        else{ alert("💀 ПОРАЖЕНИЕ!"); updateStatsAfterGame(false); updateElo(false); }
        setTimeout(()=>location.reload(),3000);
    }
    if(uaTotal<=0 && gameActive){
        gameActive=false;
        if(myTeam==='russia'){ alert("🏆 ПОБЕДА!"); updateStatsAfterGame(true); addXP(300); updateElo(true); }
        else{ alert("💀 ПОРАЖЕНИЕ!"); updateStatsAfterGame(false); updateElo(false); }
        setTimeout(()=>location.reload(),3000);
    }
}

function initZones(){
    zones=[];
    zoneData.forEach(z=>{
        let circle=L.circle(z.center,{radius:15000,color:z.team==='russia'?teamColors.russia:teamColors.ukraine,weight:2,fillOpacity:0.25}).addTo(map);
        let marker=L.marker(z.center,{icon:L.divIcon({html:`<div class="zone-marker" style="border-color:${z.team==='russia'?'#ff8888':'#88aaff'};">${z.name}<br>${Math.floor(z.hp/z.baseHp*100)}%</div>`,iconSize:[80,40]})}).addTo(map);
        zones.push({id:z.name,name:z.name,center:z.center,team:z.team,hp:z.hp,baseHp:z.baseHp,circle:circle,marker:marker});
    });
    updateZoneMarkers();
    updateTotalPercent();
}
function updateZoneMarkers(){
    zones.forEach(z=>{ let percent=Math.floor(z.hp/z.baseHp*100); z.marker.setIcon(L.divIcon({html:`<div class="zone-marker" style="border-color:${z.team==='russia'?'#ff8888':'#88aaff'};">${z.name}<br>${percent}%</div>`,iconSize:[80,40]})); });
    updateTotalPercent();
}
function removeZoneIfDestroyed(zone){
    if(zone.hp<=0){
        if(zone.circle) map.removeLayer(zone.circle);
        if(zone.marker) map.removeLayer(zone.marker);
        let idx=zones.findIndex(z=>z.id===zone.id);
        if(idx!==-1) zones.splice(idx,1);
        showHint(`🏙️ Город ${zone.name} уничтожен!`);
    }
}
function showHint(text){ let h=document.createElement('div'); h.innerHTML=text; h.style.cssText='position:fixed; top:120px; left:50%; transform:translateX(-50%); background:#000; color:white; padding:15px 25px; border-radius:15px; border:2px solid gold; z-index:9999; font-size:18px; text-align:center; white-space:nowrap;'; document.body.appendChild(h); setTimeout(()=>h.remove(),5000); }
function destroyBuilding(b){
    if(b.marker) map.removeLayer(b.marker);
    if(b.radarCircle) map.removeLayer(b.radarCircle);
    buildings=buildings.filter(b2=>b2.id!==b.id);
    radars=radars.filter(r=>r.id!==b.id);
    pvoSystems=pvoSystems.filter(p=>p.id!==b.id);
    powerPlants=powerPlants.filter(p=>p.id!==b.id);
    refineries=refineries.filter(r=>r.id!==b.id);
    rocketFactories=rocketFactories.filter(r=>r.id!==b.id);
    showHint(`⚠️ Здание ${getBuildingName(b.type)} уничтожено!`);
    addXP(50);
}

async function loadPlayerElo(){

    updateMenuEloDisplay();

async function updateElo(win){
    if(!window.db) return;
    let K=32; let expected=0.5;
    let multiplier=1;
    switch(difficulty){
        case "EASY": multiplier=0.5; break;
        case "NORMAL": multiplier=1; break;
        case "HARD": multiplier=1.5; break;
        case "EXTREME": multiplier=2; break;
    }
    let change=Math.round(K*(win?1-expected:0-expected)*multiplier);
    playerElo+=change;
    let db=window.db; let eloRef=ref(db,`players/${playerName}`);
    try{ await update(eloRef,{elo:playerElo,wins:playerStats.wins,losses:playerStats.losses}); }catch(e){}
    updateMenuEloDisplay(); loadLeaderboard();
}

function tryBuild(lat,lng,type){
    if(!airportPlaced){ alert("Сначала постройте аэродром!"); return false; }
    if(!canBuildHere(lat,lng)){ alert("Можно строить только на своей территории и не ближе 4 км к другим зданиям!"); return false; }
    let myRadars=radars.filter(r=>r.team===myTeam).length, myPvo=pvoSystems.filter(p=>p.team===myTeam).length, myPowerPlants=powerPlants.filter(p=>p.team===myTeam).length, myRefineries=refineries.filter(r=>r.team===myTeam).length;
    if(type==='radar' && myRadars>=maxRadars){ alert(`Максимум ${maxRadars} радаров`); return false; }
    if(type==='pvo' && myPvo>=maxPvo){ alert(`Максимум ${maxPvo} ПВО`); return false; }
    if(type==='powerPlant' && myPowerPlants>=maxPowerPlants){ alert(`Максимум ${maxPowerPlants} электростанций`); return false; }
    if(type==='refinery' && myRefineries>=maxRefineries){ alert(`Максимум ${maxRefineries} НПЗ`); return false; }
    let cost=costs[type]; if(resources<cost){ alert("Не хватает энергии"); return false; }
    resources-=cost; updateUI();
    let building={id:Date.now()+Math.random(),lat,lng,type,team:myTeam,hp:(type==='radar'?120:(type==='pvo'?180:(type==='powerPlant'?100:(type==='refinery'?150:200)))),radarAngle:0,marker:null,radarCircle:null};
    let icon; if(type==='radar') icon=getRadarIcon(); else if(type==='pvo') icon=getPvoIcon(); else if(type==='powerPlant') icon=getPowerPlantIcon(); else if(type==='refinery') icon=getRefineryIcon(); else if(type==='rocketFactory') icon=getRocketFactoryIcon(); else return false;
    let marker=L.marker([lat,lng],{icon}).addTo(map); building.marker=marker; buildings.push(building);
    if(type==='radar'){ radars.push(building); let circle=L.circle([lat,lng],{radius:150000,color:'#00ffff',weight:1,fillOpacity:0.05}).addTo(map); building.radarCircle=circle; showHint("🛡️ Теперь постройте ПВО"); addXP(5); }
    if(type==='pvo'){ pvoSystems.push(building); showHint("⚡ Постройте Электростанцию"); addXP(10); }
    if(type==='powerPlant'){ powerPlants.push(building); showHint("⛽ Постройте НПЗ"); }
    if(type==='refinery') refineries.push(building);
    if(type==='rocketFactory') rocketFactories.push(building);
    updateUI();
    if(!isAI && conn && conn.open) conn.send({ type:'build', buildType:type, lat, lng, team:myTeam, id:building.id });
    return true;
}

function getEnemyTargets(){
    let targets=[];
    buildings.forEach(b=>{
        if(b.team!==myTeam && b.hp>0){
            let maxHp=(b.type==='radar'?120:(b.type==='pvo'?180:(b.type==='powerPlant'?100:(b.type==='refinery'?150:200))));
            let priority=0; if(b.type==='refinery') priority=100; else if(b.type==='rocketFactory') priority=80; else if(b.type==='pvo') priority=60; else if(b.type==='radar') priority=40;
            targets.push({ id:b.id, type:'building', name:getBuildingName(b.type), lat:b.lat, lng:b.lng, hp:b.hp, maxHp, priority, display:`${getBuildingName(b.type)} (${Math.floor(b.hp/maxHp*100)}%)` });
        }
    });
    zones.forEach(z=>{ if(z.team!==myTeam && z.hp>0) targets.push({ id:z.id, type:'zone', name:z.name, lat:z.center[0], lng:z.center[1], hp:z.hp, maxHp:z.baseHp, priority:20, display:`${z.name} (${Math.floor(z.hp/z.baseHp*100)}%)` }); });
    targets.sort((a,b)=>b.priority-a.priority);
    return targets;
}

function launchAttack(airport, targetObj, type, count){
    let weapon=weaponBase[type];
    if(type==='massive_strike'){
        if(resources<weapon.cost){ alert("Не хватает энергии"); return false; }
        resources-=weapon.cost;
        for(let combo of weapon.combo) for(let i=0;i<combo.count;i++) launchSingleAttack(airport,targetObj,combo.type,1);
        updateUI(); playBeep(800,0.2);
        if(!isAI && conn && conn.open) conn.send({ type:'launch', targetId:targetObj.id, targetType:targetObj.type, weapon:type, count:1, team:myTeam, lat:targetObj.lat, lng:targetObj.lng });
        return true;
    }
    let costPerUnit=weapon.cost;
    if(type==='drone_swarm') count=10;
    if(resources<costPerUnit*(type==='drone_swarm'?1:count)){ alert("Не хватает энергии"); return false; }
    if(type==='drone_swarm'){
        resources-=costPerUnit;
        for(let i=0;i<10;i++) launchSingleAttack(airport,targetObj,'drone',1);
    } else {
        resources-=costPerUnit*count;
        for(let i=0;i<count;i++) launchSingleAttack(airport,targetObj,type,1);
    }
    updateUI(); playBeep(800,0.2);
    if(!isAI && conn && conn.open) conn.send({ type:'launch', targetId:targetObj.id, targetType:targetObj.type, weapon:type, count, team:myTeam, lat:targetObj.lat, lng:targetObj.lng });
    return true;
}
function launchSingleAttack(airport,targetObj,type,count){
    let weapon=weaponBase[type];
    let from=airport.getLatLng();
    let offset=(Math.random()-0.5)*0.05;
    let tlat=targetObj.lat+offset, tlng=targetObj.lng+offset*0.5;
    let p1=map.latLngToLayerPoint([from.lat,from.lng]), p2=map.latLngToLayerPoint([tlat,tlng]);
    let dx=p2.x-p1.x, dy=p2.y-p1.y;
    let angle=Math.atan2(dx,-dy)*180/Math.PI + (weapon.spriteOffset||0);
    let proj={ id:Date.now()+Math.random(), from, to:{lat:tlat,lng:tlng}, progress:0, speed:weapon.speed, damage:weapon.damage, team:myTeam, targetType:targetObj.type, targetId:targetObj.id, type, active:true, marker:null, lastInterceptCheck:0, interceptedFlag:false, angle };
    let marker=L.marker([proj.from.lat,proj.from.lng],{ icon:getMissileIcon(type,myTeam), rotationOrigin:'center center', rotationAngle:angle }).addTo(map);
    proj.marker=marker; projectiles.push(proj);
    playerStats.missilesLaunched++;
}

function tryIntercept(proj){
    let now=Date.now(); if(now-proj.lastInterceptCheck<2000) return false; proj.lastInterceptCheck=now;
    let pos=proj.marker.getLatLng(); let pv=pvoTypes[currentPvoLevel];
    for(let p of pvoSystems){
        if(p.team!==proj.team){
            let dist=map.distance([p.lat,p.lng],[pos.lat,pos.lng]);
            if(dist<pv.range && Math.random()<pv.chance){
                playBeep(600,0.15); launchInterceptor({lat:p.lat,lng:p.lng},pos); addXP(15); return true;
            }
        }
    }
    if(isAI && aiPvo && aiPvo.team!==proj.team){
        let dist=map.distance([aiPvo.lat,aiPvo.lng],[pos.lat,pos.lng]);
        if(dist<pv.range && Math.random()<pv.chance){
            playBeep(600,0.15); launchInterceptor({lat:aiPvo.lat,lng:aiPvo.lng},pos); addXP(15); return true;
        }
    }
    return false;
}
function launchInterceptor(start,end){
    let missile=L.marker([start.lat,start.lng],{ icon:getInterceptorIcon() }).addTo(map);
    let trail=L.polyline([[start.lat,start.lng]],{ color:'#ffffaa', weight:3 }).addTo(map);
    let t=0; let intv=setInterval(()=>{ t+=0.03; if(t>=1){ clearInterval(intv); map.removeLayer(missile); createExplosion(end.lat,end.lng); setTimeout(()=>map.removeLayer(trail),1500); return; } let lat=start.lat+(end.lat-start.lat)*t, lng=start.lng+(end.lng-start.lng)*t; let arc=0.15; lat+=Math.sin(t*Math.PI)*arc; missile.setLatLng([lat,lng]); trail.addLatLng([lat,lng]); },20);
}
function createExplosion(lat,lng){ let exp=L.marker([lat,lng],{ icon:L.divIcon({ className:'', html:'<div class="explosion"></div>', iconSize:[80,80] }) }).addTo(map); setTimeout(()=>map.removeLayer(exp),600); }

function updateProjectiles(dt){
    for(let i=0;i<projectiles.length;i++){
        let p=projectiles[i]; if(!p.active) continue;
        if(tryIntercept(p)){ p.active=false; map.removeLayer(p.marker); projectiles.splice(i,1); i--; continue; }
        p.progress+=p.speed*dt;
        if(p.progress>=1){
            p.active=false; map.removeLayer(p.marker);
            let isHit=true;
            if(p.targetType==='zone'){
                let tz=zones.find(z=>z.id===p.targetId);
                if(tz && tz.hp>0){ tz.hp=Math.max(0,tz.hp-p.damage); updateZoneMarkers(); playBeep(200,0.4); addXP(20); if(tz.hp<=0) removeZoneIfDestroyed(tz); addXP(100); } else isHit=false;
            } else {
                let tb=buildings.find(b=>b.id==p.targetId);
                if(tb && tb.hp>0){ tb.hp-=p.damage; playBeep(200,0.4); addXP(20); if(tb.hp<=0) destroyBuilding(tb); } else isHit=false;
            }
            updateStatsAfterHit(p.damage,p.targetType,isHit);
            projectiles.splice(i,1); i--;
            continue;
        }
        let lat=p.from.lat+(p.to.lat-p.from.lat)*p.progress, lng=p.from.lng+(p.to.lng-p.from.lng)*p.progress;
        p.marker.setLatLng([lat,lng]); if(p.marker.setRotationAngle) p.marker.setRotationAngle(p.angle);
    }
}

function updateProjectileVisibility(){
    for(let p of projectiles){
        if(p.team===myTeam){ p.marker._icon?.classList.remove('hidden-projectile'); continue; }
        let detected=false;
        for(let r of radars){ if(r.team!==myTeam) continue; let dist=map.distance([r.lat,r.lng],[p.marker.getLatLng().lat,p.marker.getLatLng().lng]); if(dist<150000){ detected=true; break; } }
        if(detected) p.marker._icon?.classList.remove('hidden-projectile'); else p.marker._icon?.classList.add('hidden-projectile');
    }
}
function startRadarAnimation(){
    if(radarAnimationInterval) clearInterval(radarAnimationInterval);
    radarAnimationInterval=setInterval(()=>{ for(let r of radars){ if(r.marker){ r.radarAngle=(r.radarAngle+30)%360; let div=r.marker._icon?.querySelector('.radar-icon'); if(div) div.style.transform=`rotate(${r.radarAngle}deg)`; } } updateProjectileVisibility(); },1500);
}

// AI (упрощённо)
let aiPvo=null, aiAirportCoords=null, aiBuildInterval=null;
function aiBuildLogic(){
    if(!gameActive||!isAI) return;
    let aiB=buildings.filter(b=>b.team===enemyTeam), aiRadars=aiB.filter(b=>b.type==='radar'), aiPvos=aiB.filter(b=>b.type==='pvo'), aiRefs=aiB.filter(b=>b.type==='refinery'), aiFactories=aiB.filter(b=>b.type==='rocketFactory');
    if(aiRadars.length<2) aiBuild('radar');
    else if(aiPvos.length<aiRadars.length) aiBuild('pvo');
    else if(aiRefs.length<2) aiBuild('refinery');
    else if(aiFactories.length<1) aiBuild('rocketFactory');
}
function aiBuild(type){
    let enemyZones=zones.filter(z=>z.team===enemyTeam); if(enemyZones.length===0) return;
    let zone=enemyZones[Math.floor(Math.random()*enemyZones.length)];
    let lat=zone.center[0]+(Math.random()-0.5)*0.2, lng=zone.center[1]+(Math.random()-0.5)*0.2;
    if(!canBuildForTeam(lat,lng,enemyTeam)) return;
    let building={id:Date.now()+Math.random(), lat,lng, type, team:enemyTeam, hp:(type==='radar'?120:(type==='pvo'?180:(type==='powerPlant'?100:(type==='refinery'?150:200)))), radarAngle:0, marker:null, radarCircle:null};
    let icon; if(type==='radar') icon=getRadarIcon(); else if(type==='pvo') icon=getPvoIcon(); else if(type==='powerPlant') icon=getPowerPlantIcon(); else if(type==='refinery') icon=getRefineryIcon(); else if(type==='rocketFactory') icon=getRocketFactoryIcon(); else return;
    let marker=L.marker([lat,lng],{icon}).addTo(map); building.marker=marker; buildings.push(building);
    if(type==='radar') radars.push(building); else if(type==='pvo') pvoSystems.push(building); else if(type==='powerPlant') powerPlants.push(building); else if(type==='refinery') refineries.push(building); else if(type==='rocketFactory') rocketFactories.push(building);
}
function chooseAITarget(){
    let targets=[];
    buildings.forEach(b=>{ if(b.team!==myTeam) return; let s=0; if(b.type==='refinery') s=100; else if(b.type==='rocketFactory') s=80; else if(b.type==='pvo') s=60; else if(b.type==='radar') s=40; else if(b.type==='powerPlant') s=30; if(b.hp<50) s+=40; targets.push({target:b,score:s}); });
    zones.forEach(z=>{ if(z.team!==myTeam) return; let s=20; if(z.hp<50) s+=30; targets.push({target:z,score:s}); });
    targets.sort((a,b)=>b.score-a.score); return targets.length?targets[0].target:null;
}
function initAI(){
    let enemyZones=zones.filter(z=>z.team===enemyTeam); if(enemyZones.length===0) return;
    let getCenter=(z)=>z.center;
    aiAirportCoords={lat:getCenter(enemyZones[0])[0]+(Math.random()-0.5)*0.3, lng:getCenter(enemyZones[0])[1]+(Math.random()-0.5)*0.3};
    aiPvo={lat:getCenter(enemyZones[2]||enemyZones[0])[0]+(Math.random()-0.5)*0.3, lng:getCenter(enemyZones[2]||enemyZones[0])[1]+(Math.random()-0.5)*0.3, team:enemyTeam};
    if(aiInterval) clearInterval(aiInterval);
    let attackMs=25000; if(difficulty==="EASY") attackMs=38000; if(difficulty==="HARD") attackMs=15000; if(difficulty==="EXTREME") attackMs=8000;
    aiInterval=setInterval(()=>{
        if(!gameActive) return;
        let target=chooseAITarget(); if(!target) return;
        let types=['drone','cruise','ballistic','hypersonic']; let type;
        if(difficulty==="EASY") type='drone';
        else if(difficulty==="NORMAL") type=types[Math.floor(Math.random()*2)];
        else if(difficulty==="HARD") type=types[Math.floor(Math.random()*3)];
        else type=types[Math.floor(Math.random()*4)];
        let count=1; if(difficulty==="NORMAL") count=Math.floor(Math.random()*2)+1; if(difficulty==="HARD") count=Math.floor(Math.random()*3)+1; if(difficulty==="EXTREME") count=Math.floor(Math.random()*4)+2;
        let tlat, tlng; if(target.center){ tlat=target.center[0]; tlng=target.center[1]; } else { tlat=target.lat; tlng=target.lng; }
        for(let i=0;i<count;i++){
            let off=(i-(count-1)/2)*0.03; let lat=tlat+off, lng=tlng+off*0.5;
            let p1=map.latLngToLayerPoint([aiAirportCoords.lat,aiAirportCoords.lng]), p2=map.latLngToLayerPoint([lat,lng]);
            let dx=p2.x-p1.x, dy=p2.y-p1.y;
            let angle=Math.atan2(dx,-dy)*180/Math.PI + (weaponBase[type].spriteOffset||0);
            let proj={ id:Date.now()+Math.random(), from:{lat:aiAirportCoords.lat,lng:aiAirportCoords.lng}, to:{lat,lng}, progress:0, speed:weaponBase[type].speed, damage:weaponBase[type].damage, team:enemyTeam, targetType:(target.center?'zone':'building'), targetId:target.id, type, active:true, marker:null, lastInterceptCheck:0, interceptedFlag:false, angle };
            let marker=L.marker([proj.from.lat,proj.from.lng],{ icon:getMissileIcon(type,enemyTeam), rotationOrigin:'center center', rotationAngle:angle }).addTo(map);
            proj.marker=marker; projectiles.push(proj);
        }
    }, attackMs);
    if(aiBuildInterval) clearInterval(aiBuildInterval);
    aiBuildInterval=setInterval(()=>aiBuildLogic(),30000);
}
function gameLoop(now){ if(!gameActive) return; let dt=Math.min(0.1,(now-lastUpdate)/1000); lastUpdate=now; updateProjectiles(dt); requestAnimationFrame(gameLoop); }

function initGameMapAndLogic(){
    document.getElementById('menuScreen').style.display='none';
    document.getElementById('lobbyScreen').style.display='none';
    document.getElementById('gameContainer').style.display='block';
    if(map) map.remove();
    map=L.map('map').setView([55.0,40.0],5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB'}).addTo(map);
    let ld=document.createElement('div'); ld.className='loading-indicator'; ld.innerText='Загрузка границ...'; document.body.appendChild(ld);
    loadRealBorders(()=>{
        if(ld) ld.remove();
        initZones();
        buildings=[]; radars=[]; pvoSystems=[]; powerPlants=[]; refineries=[]; rocketFactories=[]; projectiles=[];
        if(difficulty==="EASY") resources=400;
        else if(difficulty==="NORMAL") resources=300;
        else if(difficulty==="HARD") resources=220;
        else resources=150;
        airportPlaced=false; updateUI();
        map.off('click');
        map.on('click',(e)=>{
            if(!airportPlaced){
                let lat=e.latlng.lat, lng=e.latlng.lng;
                if(!isOwnTerritory(lat,lng)){ alert("Аэродром можно поставить только на своей территории!"); return; }
                let icon=getAirportIcon();
                airportMarker=L.marker([lat,lng],{icon}).addTo(map);
                airportMarker.bindPopup('<b>АЭРОДРОМ</b>');
                airportMarker.on('click',()=>{
                    let targets=getEnemyTargets(); if(targets.length===0){ alert("Нет вражеских целей!"); return; }
                    let select=document.getElementById('targetSelect'); select.innerHTML='';
                    targets.forEach(t=>{ let opt=document.createElement('option'); opt.value=t.id; opt.setAttribute('data-type',t.type); opt.textContent=t.display; select.appendChild(opt); });
                    attackType='drone'; attackCount=1; document.getElementById('countValue').innerText=attackCount; updateCostDisplay(); currentAirport=airportMarker; document.getElementById('attackModal').style.display='block';
                });
                airportPlaced=true; gameActive=true; updateUI(); lastUpdate=performance.now();
                if(isAI) initAI();
                startRadarAnimation();
                requestAnimationFrame(gameLoop);
                if(economyInterval) clearInterval(economyInterval);
                economyInterval=setInterval(()=>{ if(gameActive){ let income=5+powerPlants.filter(p=>p.team===myTeam).length*3+refineries.filter(r=>r.team===myTeam).length*15; resources+=income; updateUI(); } },1000);
                showHint("📡 Теперь постройте Радар");
                if(!isAI && conn && conn.open) conn.send({ type:'airportPlaced', lat, lng, team:myTeam });
                return;
            }
            if(buildMode){ tryBuild(e.latlng.lat,e.latlng.lng,buildMode); buildMode=null; }
        });
    });
}
function closeAttackModal(){ document.getElementById('attackModal').style.display='none'; }
function updateCostDisplay(){
    let type=attackType;
    if(type==='drone_swarm'){ document.getElementById('costDisplay').innerHTML=`СТОИМОСТЬ: ${weaponBase.drone_swarm.cost} ⚡ (10 дронов)`; return; }
    if(type==='massive_strike'){ document.getElementById('costDisplay').innerHTML=`СТОИМОСТЬ: ${weaponBase.massive_strike.cost} ⚡ (массированный удар)`; return; }
    document.getElementById('costDisplay').innerHTML=`СТОИМОСТЬ: ${weaponBase[type].cost*attackCount} ⚡`;
}
